spring.application.name=EliteMart

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/elitemart_db?\
  useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=elitemart
spring.datasource.password=elitemart123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Multipart (for image upload) ────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080


# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.elitemart=INFO
logging.level.org.springframework.security=WARN
