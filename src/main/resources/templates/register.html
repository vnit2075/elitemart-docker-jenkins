<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — EliteMart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

  <section class="auth-section">
    <div class="auth-card fade-in-up" style="max-width:460px;">

      <!-- Brand -->
      <a th:href="@{/}" class="auth-brand text-decoration-none">
        <span class="brand-elite">Elite</span><span class="brand-mart">Mart</span>
      </a>

      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join EliteMart and discover premium products</p>

      <!-- Registration form -->
      <form th:action="@{/register}" th:object="${registerForm}" method="post">

        <div class="mb-3">
          <label class="form-label" for="reg-username">Username</label>
          <input id="reg-username"
                 type="text"
                 th:field="*{username}"
                 th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                 class="form-control"
                 placeholder="Choose a username (3–20 chars)"
                 autocomplete="username">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
               th:errors="*{username}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="reg-email">Email Address</label>
          <input id="reg-email"
                 type="email"
                 th:field="*{email}"
                 th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                 class="form-control"
                 placeholder="you@example.com"
                 autocomplete="email">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}"></div>
        </div>

        <div class="mb-4">
          <label class="form-label" for="reg-password">Password</label>
          <input id="reg-password"
                 type="password"
                 th:field="*{password}"
                 th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                 class="form-control"
                 placeholder="Minimum 6 characters"
                 autocomplete="new-password">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>

      </form>

      <div class="auth-divider">or</div>

      <div class="auth-link-text">
        Already have an account?
        <a th:href="@{/login}">Sign in</a>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
