<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products — EliteMart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">
        <div>
          <span class="hero-badge" style="margin-bottom:.6rem; display:inline-block;">
            Our Collection
          </span>
          <h1 class="page-title">All Products</h1>
          <p style="color:var(--text-muted); margin:0.3rem 0 0; font-size:0.87rem;">
            <span th:text="${products.size()}">0</span> items available
          </p>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/admin/products/add}" class="btn-gold"
             style="padding:0.65rem 1.4rem; border-radius:50px;">
            <i class="bi bi-plus-lg me-2"></i>Add Product
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Products Grid -->
  <div class="container pb-5">

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(products)}" class="empty-state">
      <div class="empty-state-icon">📦</div>
      <div class="empty-state-title">No products available yet</div>
      <div class="empty-state-body">
        <span sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/admin/products/add}">Add your first product →</a>
        </span>
        <span sec:authorize="!hasRole('ADMIN')">Check back soon!</span>
      </div>
    </div>

    <!-- Grid -->
    <div class="row g-4" th:unless="${#lists.isEmpty(products)}">
      <div class="col-sm-6 col-lg-3" th:each="product : ${products}">
        <div class="product-card fade-in-up">
          <div class="product-img-wrap">
            <img th:if="${product.hasImage()}"
                 th:src="@{/products/image/{id}(id=${product.id})}"
                 th:alt="${product.name}">
            <div th:unless="${product.hasImage()}" class="product-placeholder">
              <i class="bi bi-bag-heart"></i>
              <span>No Image</span>
            </div>
          </div>
          <div class="product-body">
            <div class="product-name" th:text="${product.name}">Product Name</div>
            <div class="product-desc" th:text="${product.description}">Description goes here.</div>
            <div class="d-flex justify-content-between align-items-end">
              <div>
                <div class="product-price-label">Price</div>
                <div class="product-price"
                     th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">
                  ₹0.00
                </div>
              </div>
              <small style="color:var(--text-muted); font-size:0.7rem;"
                     th:text="${#temporals.format(product.createdAt,'dd MMM yy')}"></small>
            </div>
            <div class="product-actions">
              <button class="btn-cart">Add to Cart</button>
              <button class="btn-wish"><i class="bi bi-heart"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="elite-footer">
    <div class="container">
      <div class="footer-brand">
        <span class="brand-elite">Elite</span><span class="brand-mart">Mart</span>
      </div>
      <p class="footer-text">© 2024 EliteMart — All rights reserved</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
