<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="elite-navbar">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">

      <!-- Brand -->
      <a th:href="@{/}" class="brand-name text-decoration-none">
        <span class="brand-elite">Elite</span><span class="brand-mart">Mart</span>
      </a>

      <!-- Desktop Nav Links -->
      <div class="d-none d-lg-flex align-items-center gap-1">
        <a th:href="@{/}"        class="nav-link">Home</a>
        <a th:href="@{/products}" class="nav-link">Products</a>
        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')"
           class="nav-link">
          Admin <span class="admin-badge">ADMIN</span>
        </a>
      </div>

      <!-- Desktop Right Side -->
      <div class="d-none d-lg-flex align-items-center gap-3">

        <!-- Anonymous -->
        <div sec:authorize="isAnonymous()" class="d-flex align-items-center gap-2">
          <a th:href="@{/login}"    class="nav-link">Sign In</a>
          <a th:href="@{/register}" class="btn-gold">Register</a>
        </div>

        <!-- Authenticated -->
        <div sec:authorize="isAuthenticated()" class="dropdown">
          <button class="d-flex align-items-center gap-2 bg-transparent border-0 nav-link dropdown-toggle"
                  data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle" style="font-size:1.05rem; color:var(--gold);"></i>
            <span sec:authentication="name" style="font-size:0.875rem;"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li sec:authorize="hasRole('ADMIN')">
              <a class="dropdown-item" th:href="@{/admin/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
              </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
              <a class="dropdown-item" th:href="@{/admin/products/add}">
                <i class="bi bi-plus-circle me-2"></i>Add Product
              </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="dropdown-item" style="color:#ff8099 !important;">
                  <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
              </form>
            </li>
          </ul>
        </div>

      </div><!-- /desktop right -->

      <!-- Mobile Toggler -->
      <button class="navbar-toggler d-lg-none" type="button"
              data-bs-toggle="collapse" data-bs-target="#mobileNav"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

    </div><!-- /flex row -->

    <!-- Mobile Nav -->
    <div class="collapse" id="mobileNav">
      <div class="d-flex flex-column gap-2 py-3 border-top mt-2" style="border-color:var(--border-subtle) !important;">
        <a th:href="@{/}"         class="nav-link">Home</a>
        <a th:href="@{/products}" class="nav-link">Products</a>
        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="nav-link">
          Admin Dashboard <span class="admin-badge">ADMIN</span>
        </a>
        <div sec:authorize="isAnonymous()" class="d-flex gap-2 pt-2">
          <a th:href="@{/login}"    class="nav-link">Sign In</a>
          <a th:href="@{/register}" class="btn-gold">Register</a>
        </div>
        <div sec:authorize="isAuthenticated()" class="pt-1">
          <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="nav-link bg-transparent border-0"
                    style="color:var(--red);">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </form>
        </div>
      </div>
    </div>

  </div><!-- /container -->
</nav>

</body>
</html>
