<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EliteMart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

  <section class="auth-section">
    <div class="auth-card fade-in-up">

      <!-- Brand -->
      <a th:href="@{/}" class="auth-brand text-decoration-none">
        <span class="brand-elite">Elite</span><span class="brand-mart">Mart</span>
      </a>

      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your EliteMart account</p>

      <!-- Alerts -->
      <div th:if="${success}" class="alert-success-custom mb-3">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
      </div>
      <div th:if="${error}" class="alert-danger-custom mb-3">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
      </div>
      <div th:if="${message}" class="alert-gold mb-3">
        <i class="bi bi-info-circle me-2"></i><span th:text="${message}"></span>
      </div>

      <!-- Login form -->
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" name="username"
                 class="form-control"
                 placeholder="Enter your username"
                 required autofocus autocomplete="username">
        </div>

        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" name="password"
                 class="form-control"
                 placeholder="Enter your password"
                 required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-link-text">
        Don't have an account?
        <a th:href="@{/register}">Create one free</a>
      </div>
      
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
