<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product — EliteMart Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <section class="admin-section">
    <div class="container">

      <!-- Header -->
      <div class="admin-header">
        <div>
          <a th:href="@{/admin/dashboard}" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
          </a>
          <h1 class="admin-title">
            <i class="bi bi-plus-circle me-2" style="color:var(--gold);"></i>Add New Product
          </h1>
          <p class="admin-subtitle">Fill in the details below to list a new product</p>
        </div>
      </div>

      <!-- Form -->
      <div class="row justify-content-center">
        <div class="col-lg-8">

          <form th:action="@{/admin/products/add}"
                method="post"
                enctype="multipart/form-data">

            <!-- ── Product Details ── -->
            <div class="admin-card">
              <div class="admin-card-title">Product Details</div>

              <div class="mb-3">
                <label class="form-label" for="prod-name">Product Name *</label>
                <input id="prod-name"
                       type="text"
                       name="name"
                       class="form-control"
                       placeholder="e.g. Premium Wireless Headphones"
                       maxlength="200"
                       required>
              </div>

              <div class="mb-3">
                <label class="form-label" for="prod-desc">Description</label>
                <textarea id="prod-desc"
                          name="description"
                          class="form-control"
                          placeholder="Describe the product — features, materials, usage..."></textarea>
              </div>

              <div class="mb-1">
                <label class="form-label" for="prod-price">Price (₹) *</label>
                <input id="prod-price"
                       type="number"
                       name="price"
                       class="form-control"
                       step="0.01"
                       min="0"
                       placeholder="e.g. 1299.99"
                       required>
              </div>
            </div>

            <!-- ── Product Image ── -->
            <div class="admin-card">
              <div class="admin-card-title">Product Image</div>

              <label class="file-upload-area" for="imageInput" id="uploadArea">
                <!-- Hidden file input -->
                <input type="file"
                       name="image"
                       id="imageInput"
                       accept="image/jpeg,image/png,image/gif,image/webp"
                       onchange="previewImage(event)">

                <!-- Placeholder shown before selection -->
                <div id="uploadPlaceholder">
                  <i class="bi bi-cloud-arrow-up"
                     style="font-size:2.8rem; color:var(--gold); opacity:.65;"></i>
                  <p style="font-weight:600; margin:.6rem 0 .25rem; font-size:.95rem;">
                    Click to upload image
                  </p>
                  <p style="color:var(--text-muted); font-size:.78rem; margin:0;">
                    JPG, PNG, GIF, WEBP &mdash; up to 10 MB
                  </p>
                </div>

                <!-- Preview shown after selection -->
                <div id="previewWrap" style="display:none; text-align:center;">
                  <img id="imgPreview" src="#" alt="Preview"
                       style="max-height:200px; max-width:100%; border-radius:10px; object-fit:contain; border:1px solid var(--border);">
                  <p id="imgName"
                     style="color:var(--text-muted); font-size:.78rem; margin-top:.6rem;"></p>
                  <span style="font-size:.75rem; color:var(--gold);">
                    Click to change image
                  </span>
                </div>
              </label>
            </div>

            <!-- ── Actions ── -->
            <div class="d-flex justify-content-end gap-3">
              <a th:href="@{/admin/dashboard}"
                 style="padding:.8rem 1.4rem; border:1px solid var(--border);
                        border-radius:10px; color:var(--text-muted); font-size:.88rem;
                        transition:color .2s, border-color .2s;"
                 onmouseover="this.style.color='var(--text-primary)'; this.style.borderColor='rgba(255,255,255,.15)';"
                 onmouseout="this.style.color='var(--text-muted)'; this.style.borderColor='var(--border)';">
                Cancel
              </a>
              <button type="submit" class="btn-submit"
                      style="width:auto; padding:.82rem 2rem;">
                <i class="bi bi-check-circle me-2"></i>Add Product
              </button>
            </div>

          </form>
        </div>
      </div>

    </div><!-- /container -->
  </section>

  <!-- Footer -->
  <footer class="elite-footer">
    <div class="container">
      <div class="footer-brand">
        <span class="brand-elite">Elite</span><span class="brand-mart">Mart</span>
      </div>
      <p class="footer-text">© 2024 EliteMart Admin Panel</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('imgPreview').src = e.target.result;
        document.getElementById('imgName').textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
        document.getElementById('uploadPlaceholder').style.display = 'none';
        document.getElementById('previewWrap').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
